services:
  - type: web
    name: sqcdp-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sqcdp-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://sqcdp.vercel.app,http://localhost:5173
      - key: DEFAULT_SITE
        value: Site principal

databases:
  - name: sqcdp-db
    plan: free
